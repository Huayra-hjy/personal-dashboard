<style>
  /* ========== LINEAR DESIGN TOKENS ========== */
  :root {
    /* Brand & Accent */
    --primary: #5e6ad2;
    --primary-hover: #828fff;
    --primary-focus: #5e69d1;
    --on-primary: #ffffff;
    --brand-secure: #7a7fad;

    /* Surface Ladder (4-step) */
    --canvas: #010102;
    --surface-1: #0f1011;
    --surface-2: #141516;
    --surface-3: #18191a;
    --surface-4: #191a1b;

    /* Hairline Borders */
    --hairline: #23252a;
    --hairline-strong: #34343a;
    --hairline-tertiary: #3e3e44;

    /* Text */
    --ink: #f7f8f8;
    --ink-muted: #d0d6e0;
    --ink-subtle: #8a8f98;
    --ink-tertiary: #62666d;

    /* Semantic */
    --success: #27a644;
    --danger: #e5484d;
    --warning: #f5a623;

    /* Typography */
    --font-display: 'Inter', -apple-system, 'SF Pro Display', system-ui, sans-serif;
    --font-text: 'Inter', -apple-system, 'SF Pro Text', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;

    /* Spacing */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
    --space-section: 96px;

    /* Radius */
    --radius-xs: 6px;
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 24px;
    --radius-pill: 9999px;

    /* Transition */
    --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
    --transition: 0.15s var(--ease);
  }

  /* ========== BASE ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-text);
    background: var(--canvas);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-xl) var(--space-lg) 100px;
  }

  /* ========== HEADER ========== */
  .header {
    text-align: center;
    margin-bottom: var(--space-2xl);
    padding: var(--space-2xl) 0;
  }
  #clock {
    font-family: var(--font-display);
    font-size: 80px;
    font-weight: 600;
    letter-spacing: -3.0px;
    line-height: 1.05;
    color: var(--ink);
  }
  #date {
    font-family: var(--font-text);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-subtle);
    margin-top: var(--space-sm);
    letter-spacing: 0.4px;
    line-height: 1.3;
    text-transform: uppercase;
  }
  #greeting {
    font-family: var(--font-text);
    font-size: 18px;
    font-weight: 400;
    color: var(--ink-muted);
    margin-top: var(--space-sm);
    letter-spacing: -0.1px;
    line-height: 1.5;
  }

  /* ========== SEARCH ========== */
  .search-wrap {
    margin: 0 auto var(--space-2xl);
    max-width: 640px;
  }
  .search-engines {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .se-btn {
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--ink-tertiary);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--font-text);
    letter-spacing: 0;
  }
  .se-btn:hover {
    border-color: var(--hairline-strong);
    color: var(--ink-subtle);
  }
  .se-btn.active {
    background: var(--surface-2);
    border-color: var(--hairline-strong);
    color: var(--ink);
  }
  .search-box {
    position: relative;
    background: var(--surface-1);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    overflow: hidden;
    transition: all var(--transition);
  }
  .search-box:focus-within {
    border-color: var(--primary-focus);
    box-shadow: 0 0 0 2px rgba(94, 106, 210, 0.15);
  }
  .search-box input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 50px 14px 20px;
    color: var(--ink);
    font-size: 16px;
    font-family: var(--font-text);
    letter-spacing: -0.05px;
    line-height: 1.5;
  }
  .search-box input::placeholder { color: var(--ink-tertiary); }
  .search-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-tertiary);
    font-size: 16px;
    pointer-events: none;
  }
  .search-suggestions {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--surface-2);
    border: 1px solid var(--hairline);
    border-top: none;
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    display: none;
    z-index: 50;
  }
  .search-suggestions.show { display: block; }
  .suggestion-item {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    color: var(--ink-muted);
    letter-spacing: -0.05px;
    line-height: 1.5;
    transition: all 0.1s;
  }
  .suggestion-item:hover {
    background: var(--surface-3);
    color: var(--ink);
  }
  .suggestion-item .shortcut {
    float: right;
    color: var(--ink-tertiary);
    font-size: 11px;
    font-family: var(--font-mono);
  }

  /* ========== CARDS ========== */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: var(--space-2xl);
  }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    transition: all var(--transition);
  }
  .card:hover {
    border-color: var(--hairline-strong);
  }
  .card-label {
    font-family: var(--font-text);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    line-height: 1.3;
    color: var(--ink-subtle);
    margin-bottom: var(--space-md);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label .label-icon { font-size: 14px; }
  .card-span-2 { grid-column: span 2; }
  .card-span-3 { grid-column: span 3; }

  /* ========== WEATHER ========== */
  #weather-temp {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 600;
    letter-spacing: -1.0px;
    line-height: 1.15;
  }
  #weather-desc {
    color: var(--ink-tertiary);
    font-size: 13px;
    margin-top: 4px;
    letter-spacing: 0;
  }
  #weather-icon { font-size: 36px; margin-bottom: 8px; }
  .weather-forecast { display: flex; gap: 10px; margin-top: 14px; }
  .forecast-day {
    flex: 1;
    text-align: center;
    padding: 10px 6px;
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    border: 1px solid var(--hairline);
  }
  .forecast-day .fd-label {
    font-size: 11px;
    color: var(--ink-tertiary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .forecast-day .fd-icon { font-size: 18px; }
  .forecast-day .fd-temp {
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* ========== QUOTE ========== */
  .quote-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 12px 0 8px;
    position: relative;
  }
  .quote-mark {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 64px;
    line-height: 0.6;
    color: var(--primary);
    opacity: 0.15;
    position: absolute;
    top: 0;
    left: -4px;
    pointer-events: none;
    user-select: none;
  }
  #quote {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--ink);
    letter-spacing: -0.2px;
    font-style: normal;
    padding-left: 2px;
  }
  #quote-author {
    font-family: var(--font-text);
    color: var(--ink-tertiary);
    font-size: 13px;
    font-weight: 400;
    margin-top: 14px;
    letter-spacing: 0;
    line-height: 1.3;
    text-align: right;
  }
  .quote-refresh {
    background: transparent;
    border: none;
    color: var(--ink-tertiary);
    font-size: 12px;
    padding: 6px 0;
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--font-text);
    align-self: flex-end;
    margin-top: auto;
  }
  .quote-refresh:hover { color: var(--primary); }

  /* ========== QUICK LINKS ========== */
  .links-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-md);
  }
  .links-edit-btn {
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--ink-tertiary);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all var(--transition);
    letter-spacing: 0.4px;
  }
  .links-edit-btn:hover {
    border-color: var(--hairline-strong);
    color: var(--ink-subtle);
  }
  .links-edit-btn.active {
    background: var(--surface-2);
    border-color: var(--hairline-strong);
    color: var(--ink);
  }
  .links {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .links a {
    color: var(--ink-muted);
    text-decoration: none;
    font-size: 13px;
    padding: 14px 12px;
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    transition: all var(--transition);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: var(--surface-1);
    position: relative;
  }
  .links a .link-icon {
    width: 28px;
    height: 28px;
    object-fit: contain;
    border-radius: var(--radius-xs);
  }
  .mimo-link .mimo-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
  }
  .links a .link-label {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: -0.12px;
    line-height: 1.33;
  }
  .links a:hover {
    color: var(--ink);
    border-color: var(--hairline-strong);
    background: var(--surface-2);
  }
  .link-remove {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(229, 72, 77, 0.1);
    border: none;
    color: var(--danger);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .editing .link-remove { display: flex; }
  .editing a { border-style: dashed; }
  .link-add {
    color: var(--ink-tertiary);
    text-decoration: none;
    font-size: 13px;
    padding: 14px 12px;
    border: 1px dashed var(--hairline);
    border-radius: var(--radius-md);
    transition: all var(--transition);
    text-align: center;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: transparent;
    cursor: pointer;
    min-height: 80px;
  }
  .link-add:hover {
    border-color: var(--hairline-strong);
    color: var(--ink-subtle);
    background: var(--surface-2);
  }
  .editing .link-add { display: flex; }

  /* Link edit dialog */
  .link-dialog {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .link-dialog.show { display: flex; }
  .link-dialog-box {
    background: var(--surface-2);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .link-dialog-box h3 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.05px;
    margin-bottom: var(--space-md);
  }
  .link-dialog-box input {
    width: 100%;
    background: var(--surface-1);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    color: var(--ink);
    font-size: 14px;
    font-family: var(--font-text);
    margin-bottom: 10px;
    outline: none;
    letter-spacing: -0.05px;
  }
  .link-dialog-box input:focus {
    border-color: var(--primary-focus);
    box-shadow: 0 0 0 2px rgba(94, 106, 210, 0.15);
  }
  .link-dialog-box .dialog-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: var(--space-md);
  }
  .dialog-btn {
    padding: 8px 16px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--font-text);
    letter-spacing: 0;
  }
  .dialog-btn-cancel {
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--ink-muted);
  }
  .dialog-btn-cancel:hover {
    border-color: var(--hairline-strong);
    color: var(--ink);
  }
  .dialog-btn-save {
    background: var(--primary);
    border: none;
    color: var(--on-primary);
  }
  .dialog-btn-save:hover {
    background: var(--primary-hover);
  }

  /* ========== HERMES STATUS ========== */
  .hermes-status { display: flex; flex-direction: column; gap: 10px; }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--ink-muted);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .status-dot.online {
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
  }
  .status-dot.offline {
    background: var(--danger);
    box-shadow: 0 0 6px var(--danger);
  }
  .status-dot.unknown { background: var(--ink-tertiary); }
  .hermes-cron-list { margin-top: 8px; }
  .cron-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 12px;
    color: var(--ink-tertiary);
    border-bottom: 1px solid var(--hairline);
  }
  .cron-item:last-child { border-bottom: none; }
  .cron-schedule {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--primary);
    min-width: 60px;
  }

  /* ========== TODO ========== */
  .todo-input-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: var(--space-md);
  }
  .todo-input {
    flex: 1;
    background: var(--surface-1);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    color: var(--ink);
    font-size: 13px;
    font-family: var(--font-text);
    outline: none;
    letter-spacing: -0.05px;
  }
  .todo-input:focus {
    border-color: var(--primary-focus);
    box-shadow: 0 0 0 2px rgba(94, 106, 210, 0.15);
  }
  .todo-add-btn {
    background: var(--primary);
    border: none;
    color: var(--on-primary);
    padding: 8px 14px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--font-text);
    letter-spacing: 0;
  }
  .todo-add-btn:hover { background: var(--primary-hover); }
  .todo-list { max-height: 200px; overflow-y: auto; }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--hairline);
    font-size: 13px;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-check {
    width: 16px;
    height: 16px;
    border-radius: var(--radius-xs);
    border: 1.5px solid var(--hairline-strong);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    flex-shrink: 0;
    background: transparent;
  }
  .todo-check:hover { border-color: var(--primary); }
  .todo-item.done .todo-check {
    background: var(--surface-2);
    border-color: var(--primary);
  }
  .todo-item.done .todo-check::after {
    content: '✓';
    font-size: 10px;
    color: var(--primary);
  }
  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--ink-tertiary);
  }
  .todo-text { flex: 1; color: var(--ink-muted); }
  .todo-delete {
    background: transparent;
    border: none;
    color: var(--ink-tertiary);
    font-size: 14px;
    cursor: pointer;
    opacity: 0;
    transition: all var(--transition);
    padding: 2px 4px;
  }
  .todo-item:hover .todo-delete { opacity: 1; }
  .todo-delete:hover { color: var(--danger); }
  .todo-list::-webkit-scrollbar { width: 4px; }
  .todo-list::-webkit-scrollbar-thumb {
    background: var(--hairline-strong);
    border-radius: 2px;
  }

  /* ========== PLAYER BAR ========== */
  .player-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--surface-1);
    border-top: 1px solid var(--hairline);
    backdrop-filter: blur(20px);
    padding: 12px var(--space-lg);
    display: flex;
    align-items: center;
    gap: var(--space-md);
  }
  .player-cover {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-md);
    background: var(--surface-2);
    border: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: all var(--transition);
    color: var(--primary);
  }
  .player-cover.playing {
    animation: coverSpin 8s linear infinite;
    border-radius: 50%;
  }
  @keyframes coverSpin {
    from { transform: rotate(0); }
    to { transform: rotate(360deg); }
  }
  .player-info { flex: 1; min-width: 0; }
  .player-title {
    font-family: var(--font-text);
    font-size: 14px;
    font-weight: 400;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.05px;
    line-height: 1.5;
  }
  .player-artist {
    font-family: var(--font-text);
    font-size: 12px;
    font-weight: 400;
    color: var(--ink-tertiary);
    margin-top: 2px;
    letter-spacing: 0;
    line-height: 1.3;
  }
  .player-controls { display: flex; align-items: center; gap: 4px; }
  .player-btn {
    background: none;
    border: none;
    color: var(--ink-tertiary);
    cursor: pointer;
    font-size: 16px;
    padding: 8px;
    border-radius: 50%;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .player-btn:hover {
    color: var(--ink);
    background: var(--surface-2);
  }
  .player-btn.play-btn {
    width: 40px;
    height: 40px;
    font-size: 16px;
    background: var(--primary);
    color: var(--on-primary);
  }
  .player-btn.play-btn:hover {
    background: var(--primary-hover);
  }
  .player-progress { flex: 2; display: flex; align-items: center; gap: 8px; }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--hairline);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s linear;
    opacity: 0.8;
  }
  .progress-time {
    font-size: 11px;
    color: var(--ink-tertiary);
    min-width: 36px;
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
  }
  .player-volume { display: flex; align-items: center; gap: 6px; }
  .volume-bar {

  /* ========== GRADIENT TEXT (GSAP brand style) ========== */
  .gradient-text {

  @keyframes fadeInUp {

  /* Clock character reveal (SplitText-style) */
  #clock .char {
    display: inline-block;

    transform: translateY(16px);
    background: linear-gradient(135deg, #5e6ad2, #828fff, #a78bfa);

function showToast(msg, duration=2000) {

}

// ========== CLOCK ==========
let clockChars = null;
let lastClockStr = '';

function splitClockChars(str) {
  const el = document.getElementById('clock');
  if (!clockChars || clockChars.length !== str.length) {
    el.innerHTML = '';
    clockChars = [];
    for (let i = 0; i < str.length; i++) {
      const inner = document.createElement('span');
      inner.className = 'char';
      inner.textContent = str[i];
      el.appendChild(inner);
      clockChars.push(inner);
    }
    // Staggered reveal
    clockChars.forEach((c, i) => {
      setTimeout(() => c.classList.add('revealed'), i * 60);
    });
  } else {
    for (let i = 0; i < str.length; i++) {
      if (clockChars[i].textContent !== str[i]) {
        clockChars[i].textContent = str[i];
        // Trigger flip animation
        clockChars[i].classList.remove('flip');
        void clockChars[i].offsetWidth; // Force reflow
        clockChars[i].classList.add('flip');
      }
    }
  }
}

function updateClock(){
  const now=new Date();
  const timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  splitClockChars(timeStr);
  const days=['日','一','二','三','四','五','六'];
  document.getElementById('date').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+days[now.getDay()];
  const h=now.getHours();let g='夜深了';
  if(h>=5&&h<9)g='早安';else if(h>=9&&h<12)g='上午好';else if(h>=12&&h<14)g='中午好';else if(h>=14&&h<18)g='下午好';else if(h>=18&&h<22)g='晚上好';
  document.getElementById('greeting').textContent=g+'，殿下';
}

const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

});

// ========== HERMES STATUS ==========
async function checkHermes(){
  const gatewayEl=document.getElementById('hermesGateway');
  const versionEl=document.getElementById('hermesVersion');
  const modelEl=document.getElementById('hermesModel');
  const cronEl=document.getElementById('hermesCronList');

  try {
    const r=await fetch('http://127.0.0.1:9119/api/status',{signal:AbortSignal.timeout(3000)});
    if(r.ok){
      const d=await r.json();
      gatewayEl.innerHTML='<span class="status-dot online"></span>运行中';
      versionEl.textContent=d.version||'--';
      modelEl.textContent=d.model||'--';
    } else {
      gatewayEl.innerHTML='<span class="status-dot offline"></span>异常 ('+r.status+')';
    }
  } catch(e){
    try {
      const r2=await fetch('http://127.0.0.1:8642/health',{signal:AbortSignal.timeout(3000)});
      if(r2.ok){
        gatewayEl.innerHTML='<span class="status-dot online"></span>Gateway 运行中';
      } else {
        gatewayEl.innerHTML='<span class="status-dot offline"></span>未响应';
      }
    } catch(e2){
      gatewayEl.innerHTML='<span class="status-dot offline"></span>未运行';
    }
  }

  try {
    const r=await fetch('http://127.0.0.1:9119/api/cron',{signal:AbortSignal.timeout(3000)});
    if(r.ok){
      const jobs=await r.json();
      if(Array.isArray(jobs)&&jobs.length>0){
        cronEl.innerHTML=jobs.slice(0,4).map(j=>
          '<div class="cron-item"><span class="cron-schedule">'+(j.schedule||'')+'</span><span>'+(j.name||j.prompt?.substring(0,30)||'未命名')+'</span></div>'
        ).join('');
      }
    }
  } catch(e){ /* ignore */ }
}

// ========== MUSIC PLAYER ==========
const audio=new Audio();
let playlist=[],currentIndex=-1,isPlaying=false,isStream=false,playMode='sequential';
let localTracks=[];

const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const playerTitle=document.getElementById('playerTitle');
const playerArtist=document.getElementById('playerArtist');
const playerCover=document.getElementById('playerCover');
const progressBar=document.getElementById('progressBar');
const progressFill=document.getElementById('progressFill');
const timeNow=document.getElementById('timeNow');
const timeTotal=document.getElementById('timeTotal');
const volumeBar=document.getElementById('volumeBar');
const volumeFill=document.getElementById('volumeFill');
const shuffleBtn=document.getElementById('shuffleBtn');
const repeatBtn=document.getElementById('repeatBtn');
const playlistToggle=document.getElementById('playlistToggle');
const playlistPanel=document.getElementById('playlistPanel');
const playlistList=document.getElementById('playlistList');
const addMusicBtn=document.getElementById('addMusicBtn');

// Load radio stations
let currentTab='local';
if(typeof RADIO_STATIONS!=='undefined'){
  const radioTab=document.querySelector('[data-tab="radio"]');

  document.querySelectorAll('.playlist-tab').forEach(tab=>{

      tab.classList.add('active');
      currentTab=tab.dataset.tab;
      if(currentTab==='local'){playlist=localTracks}
      else{playlist=RADIO_STATIONS||[]}
      renderPlaylist();
    };
  });

// Load local tracks from localStorage
try{
  const saved=localStorage.getItem('dashboard-playlist');
  if(saved)localTracks=JSON.parse(saved);
}catch(e){}
// Load from music-data.js if available and localStorage is empty
if(localTracks.length===0 && typeof LOCAL_TRACKS!=='undefined' && LOCAL_TRACKS.length>0){
  localTracks=LOCAL_TRACKS;
}
playlist=localTracks;

function renderPlaylist(){
  playlistList.innerHTML=playlist.map((t,i)=>
    '<div class="playlist-item '+(i===currentIndex?'active':'')+'" data-idx="'+i+'">'+
    '<span class="pi-num">'+(i===currentIndex&&isPlaying?'&#9654;':String(i+1).padStart(2,'0'))+'</span>'+
    '<span class="pi-name">'+t.name+'</span>'+
    '<span class="pi-artist">'+(t.artist||'')+'</span>'+
    '<span class="pi-dur">'+(t.type==='stream'?'∞':'')+'</span>'+
    '</div>'
  ).join('');
  playlistList.querySelectorAll('.playlist-item').forEach(el=>{
    el.onclick=()=>playTrack(parseInt(el.dataset.idx));
  });
}

function updateMediaSession(track){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({
    title:track.name,
    artist:track.artist||'未知',
    album:track.type==='stream'?'在线电台':'本地音乐',
  });
}

function playTrack(idx){
  if(idx<0||idx>=playlist.length)return;
  currentIndex=idx;
  const track=playlist[idx];
  isStream=track.type==='stream';
  // Try with crossOrigin for visualizer, fallback without if it fails
  if(isStream){
    audio.crossOrigin='anonymous';
    audio.src=track.url;
    // If CORS blocks the request, the 'error' event fires — retry without crossOrigin
    const onError=()=>{
      audio.removeEventListener('error',onError);
      audio.crossOrigin=null;
      audio.src=track.url;
      audio.play().then(()=>{isPlaying=true;playBtn.textContent='⏸';playerCover.classList.add('playing')}).catch(()=>{});
    };
    audio.addEventListener('error',onError,{once:true});
    audio.play().then(()=>{
      audio.removeEventListener('error',onError);
      isPlaying=true;playBtn.textContent='⏸';playerCover.classList.add('playing');
    }).catch(()=>{});
  } else {
    audio.crossOrigin=null;
    audio.src=track.url;
    audio.play().then(()=>{isPlaying=true;playBtn.textContent='⏸';playerCover.classList.add('playing')}).catch(()=>{playerTitle.textContent='播放失败'});
  }
  playerTitle.textContent=track.name;
  playerArtist.textContent=track.artist||'未知';
  updateMediaSession(track);
  renderPlaylist();
}

function getNextIndex(){
  if(playlist.length===0)return 0;
  if(playMode==='shuffle'){let n;do{n=Math.floor(Math.random()*playlist.length)}while(n===currentIndex&&playlist.length>1);return n}
  return(currentIndex+1)%playlist.length;
}
function getPrevIndex(){
  if(playlist.length===0)return 0;
  if(playMode==='shuffle'){let n;do{n=Math.floor(Math.random()*playlist.length)}while(n===currentIndex&&playlist.length>1);return n}
  return(currentIndex-1+playlist.length)%playlist.length;
}

playBtn.onclick=()=>{
  if(playlist.length===0)return;
  if(currentIndex<0){playTrack(0);return}
  if(isPlaying){audio.pause();isPlaying=false;playBtn.textContent='▶';playerCover.classList.remove('playing')}
  else{audio.play().catch(()=>{});isPlaying=true;playBtn.textContent='⏸';playerCover.classList.add('playing')}
};
prevBtn.onclick=()=>{
  if(playlist.length===0)return;
  if(playMode==='repeat'){audio.currentTime=0;audio.play()}
  else{playTrack(getPrevIndex())}
};
nextBtn.onclick=()=>{
  if(playlist.length===0)return;
  if(playMode==='repeat'){audio.currentTime=0;audio.play()}
  else{playTrack(getNextIndex())}
};

function setMode(m){
  if(playMode===m){playMode='sequential';shuffleBtn.classList.remove('active');repeatBtn.classList.remove('active')}
  else{playMode=m;shuffleBtn.classList.toggle('active',m==='shuffle');repeatBtn.classList.toggle('active',m==='repeat')}
}
shuffleBtn.addEventListener('click',()=>setMode('shuffle'));
repeatBtn.addEventListener('click',()=>setMode('repeat'));

function updateProgress(){
  if(isPlaying){
    if(isStream){progressFill.style.width='100%';timeNow.textContent=fmtTime(audio.currentTime);timeTotal.textContent='∞'}
    else if(audio.duration&&isFinite(audio.duration)){
      const pct=(audio.currentTime/audio.duration)*100;
      progressFill.style.width=pct+'%';timeNow.textContent=fmtTime(audio.currentTime);timeTotal.textContent=fmtTime(audio.duration);
    }
  }
  requestAnimationFrame(updateProgress);
}
updateProgress();

audio.addEventListener('ended',()=>{
  if(isStream)return;
  if(playMode==='repeat'){audio.currentTime=0;audio.play()}
  else{playTrack(getNextIndex())}
});
audio.addEventListener('pause',()=>{isPlaying=false;playBtn.textContent='▶';playerCover.classList.remove('playing');if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused'});
audio.addEventListener('play',()=>{isPlaying=true;playBtn.textContent='⏸';playerCover.classList.add('playing');if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing'});

progressBar.onclick=(e)=>{
  if(isStream||!audio.duration||!isFinite(audio.duration))return;
  const rect=progressBar.getBoundingClientRect();
  audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;
};
volumeBar.onclick=(e)=>{
  const rect=volumeBar.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  audio.volume=pct;volumeFill.style.width=(pct*100)+'%';
};
audio.volume=0.7;

// MediaSession API
if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',()=>{audio.play().catch(()=>{})});
  navigator.mediaSession.setActionHandler('pause',()=>{audio.pause()});
  navigator.mediaSession.setActionHandler('previoustrack',()=>{prevBtn.click()});
  navigator.mediaSession.setActionHandler('nexttrack',()=>{nextBtn.click()});
  navigator.mediaSession.setActionHandler('seekbackward',()=>{audio.currentTime=Math.max(0,audio.currentTime-10)});
  navigator.mediaSession.setActionHandler('seekforward',()=>{audio.currentTime=Math.min(audio.duration||0,audio.currentTime+10)});
}

playlistToggle.onclick=(e)=>{
  const isOpen=playlistPanel.classList.toggle('show');
  playlistToggle.textContent=isOpen?'✕':'♫';
  // Prevent document click listener from immediately closing
  e.stopPropagation();
};
document.addEventListener('click',e=>{
  if(!playlistPanel.contains(e.target)&&e.target!==playlistToggle&&playlistPanel.classList.contains('show')){
    playlistPanel.classList.remove('show');playlistToggle.textContent='♫';
  }
});
addMusicBtn.onclick=()=>fileInput.click();
fileInput.onchange=(e)=>{
  for(const file of e.target.files){
    const url=URL.createObjectURL(file);
    const name=file.name.replace(/\.[^.]+$/,'');
    let artist='本地音乐',title=name;
    if(name.includes(' - ')){const parts=name.split(' - ',2);artist=parts[0];title=parts[1]}
    localTracks.push({name:title,artist,url,type:'file'});
  }
  if(currentTab==='local'){playlist=localTracks;renderPlaylist()}
  if(currentIndex<0)playTrack(0);
};

function fmtTime(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0')}

// ========== VISUALIZER ==========
const visCanvas=document.getElementById('visCanvas');
const visCtx=visCanvas.getContext('2d');
let audioCtx,analyser,dataArray,source;
function initVisualizer(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;
    source=audioCtx.createMediaElementSource(audio);
    source.connect(analyser);analyser.connect(audioCtx.destination);
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    drawVis();
  }catch(e){/* CORS blocked — visualizer won't work for this stream */}
}
function drawVis(){
  requestAnimationFrame(drawVis);
  analyser.getByteFrequencyData(dataArray);
  visCanvas.width=window.innerWidth;visCanvas.height=50;
  visCtx.clearRect(0,0,visCanvas.width,visCanvas.height);
  const bars=dataArray.length/2;const barW=visCanvas.width/bars;
  for(let i=0;i<bars;i++){
    const v=dataArray[i]/255;const h=v*40;
    const hue=235+v*30;
    visCtx.fillStyle='hsla('+hue+',60%,65%,'+v*0.5+')';
    visCtx.fillRect(i*barW,50-h,barW-1,h);
    visCtx.fillStyle='hsla('+hue+',60%,65%,'+v*0.15+')';
    visCtx.fillRect(i*barW,50,barW-1,h*0.4);
  }
}
document.addEventListener('click',()=>initVisualizer(),{once:true});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();playBtn.click()}
  if(e.code==='ArrowLeft')audio.currentTime=Math.max(0,audio.currentTime-5);
  if(e.code==='ArrowRight'&&audio.duration)audio.currentTime=Math.min(audio.duration,audio.currentTime+5);
});

const cmdInput=document.getElementById('cmdInput');

let cmdActiveIdx=0;

const CMD_ITEMS=[

  {icon:'🔍',label:'搜索 GitHub',action:()=>{window.open('https://github.com','_blank')}},

];

function renderCmdList(filter=''){
  const filtered=CMD_ITEMS.filter(i=>i.label.toLowerCase().includes(filter.toLowerCase()));
  cmdActiveIdx=0;
  cmdList.innerHTML=filtered.map((i,idx)=>
    '<div class="cmd-item'+(idx===0?' active':'')+'" data-idx="'+idx+'">'+
    '<span class="cmd-icon">'+i.icon+'</span>'+
    '<span class="cmd-label">'+i.label+'</span>'+
    '</div>'
  ).join('')||'<div style="padding:12px 14px;color:var(--ink-tertiary);font-size:13px">没有匹配的命令</div>';
  cmdList.querySelectorAll('.cmd-item').forEach((el,idx)=>{
    el.onclick=()=>{filtered[idx]?.action();closeCmdPalette()};
    el.onmouseenter=()=>{
      cmdList.querySelectorAll('.cmd-item').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
      cmdActiveIdx=idx;
    };
  });
  window._cmdFiltered=filtered;
}
function openCmdPalette(){
  cmdOverlay.classList.add('show');
  cmdInput.value='';
  renderCmdList();
  setTimeout(()=>cmdInput.focus(),50);
}
function closeCmdPalette(){
  cmdOverlay.classList.remove('show');
  cmdInput.value='';
}
cmdInput.addEventListener('input',()=>renderCmdList(cmdInput.value));
cmdInput.addEventListener('keydown',e=>{
  const items=window._cmdFiltered||[];
  if(e.key==='Escape'){closeCmdPalette()}
  if(e.key==='ArrowDown'){e.preventDefault();cmdActiveIdx=Math.min(cmdActiveIdx+1,items.length-1);updateCmdActive()}
  if(e.key==='ArrowUp'){e.preventDefault();cmdActiveIdx=Math.max(cmdActiveIdx-1,0);updateCmdActive()}
  if(e.key==='Enter'){items[cmdActiveIdx]?.action();closeCmdPalette()}
});
function updateCmdActive(){
  cmdList.querySelectorAll('.cmd-item').forEach((el,i)=>el.classList.toggle('active',i===cmdActiveIdx));
  cmdList.querySelectorAll('.cmd-item')[cmdActiveIdx]?.scrollIntoView({block:'nearest'});
}
cmdOverlay.addEventListener('click',e=>{if(e.target===cmdOverlay)closeCmdPalette()});

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();cmdPaletteToggle()}
});
function cmdPaletteToggle(){
  if(cmdOverlay.classList.contains('show'))closeCmdPalette();
  else openCmdPalette();
}

// ========== SYSTEM MONITOR ==========
function updateSysMonitor(){
  const cores=navigator.hardwareConcurrency||4;
  document.getElementById('cpuVal').textContent=cores+' 核心';
  document.getElementById('cpuBar').style.width=Math.min(100,cores*12)+'%';

  if(performance.memory){
    const heap=performance.memory.usedJSHeapSize;
    const limit=performance.memory.jsHeapSizeLimit;
    const pct=Math.round((heap/limit)*100);
    document.getElementById('heapVal').textContent=(heap/1048576).toFixed(1)+'MB / '+(limit/1048576).toFixed(0)+'MB';
    document.getElementById('heapBar').style.width=pct+'%';
  } else {
    document.getElementById('heapVal').textContent='不可用';
    document.getElementById('heapBar').style.width='0%';
  }

  const conn=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  document.getElementById('netVal').textContent=conn?(conn.effectiveType||conn.type||'未知'):'不可用';
}
updateSysMonitor();
setInterval(updateSysMonitor,5000);

(function(){

  }
  grid.innerHTML=html;
  document.getElementById('ghTotal').textContent=total+' 次贡献';
})();

// ========== COUNTDOWN ==========
const DEFAULT_COUNTDOWNS=[
  {name:'2026 春节',date:'2026-02-17'},
  {name:'中秋',date:'2026-10-04'},
  {name:'元旦',date:'2027-01-01'},
];
let countdowns=JSON.parse(localStorage.getItem('dashboard-countdowns')||'null')||DEFAULT_COUNTDOWNS;

function renderCountdowns(){
  const el=document.getElementById('countdownList');
  const now=new Date();
  now.setHours(0,0,0,0);
  const sorted=[...countdowns].sort((a,b)=>new Date(a.date)-new Date(b.date));
  el.innerHTML=sorted.map(c=>{
    const target=new Date(c.date);
    target.setHours(0,0,0,0);
    const diff=Math.ceil((target-now)/(1000*60*60*24));
    let cls='';
    if(diff===0)cls=' today';
    else if(diff<=7)cls=' soon';
    const label=diff===0?'🎉 今天！':diff<0?Math.abs(diff)+' 天前':diff+' 天';
    return '<div class="countdown-item"><span class="cd-name">'+c.name+'</span><span class="cd-days'+cls+'">'+label+'</span></div>';
  }).join('')||'<div style="color:var(--ink-tertiary);font-size:12px;padding:8px 0">暂无倒计时</div>';
  localStorage.setItem('dashboard-countdowns',JSON.stringify(countdowns));
}
function addCountdown(){
  const name=document.getElementById('cdNameInput').value.trim();
  const date=document.getElementById('cdDateInput').value;
  if(!name||!date){showToast('请输入名称和日期');return}
  countdowns.push({name,date});
  renderCountdowns();
  document.getElementById('cdNameInput').value='';
  document.getElementById('cdDateInput').value='';
  showToast('已添加倒计时');
}
