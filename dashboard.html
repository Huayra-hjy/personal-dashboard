<style>
  /* ========== LINEAR DESIGN TOKENS=*** */
  :root {
    /* Brand & Accent */
    --primary: #5e6ad2;
    --primary-hover: #828fff;
    --primary-focus: #5e69d1;
    --on-primary: #ffffff;
    --brand-secure: #7a7fad;

    /* Surface Ladder (4-step) */
    --canvas: #010102;
    --surface-1: #0f1011;
    --surface-2: #141516;
    --surface-3: #18191a;
    --surface-4: #191a1b;

    /* Hairline Borders */
    --hairline: #23252a;
    --hairline-strong: #34343a;
    --hairline-tertiary: #3e3e44;

    /* Text */
    --ink: #f7f8f8;
    --ink-muted: #d0d6e0;
    --ink-subtle: #8a8f98;
    --ink-tertiary: #62666d;

    /* Semantic */
    --success: #27a644;
    --danger: #e5484d;
    --warning: #f5a623;

    /* Typography */
    --font-display: 'Inter', -apple-system, 'SF Pro Display', system-ui, sans-serif;
    --font-text: 'Inter', -apple-system, 'SF Pro Text', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;

    /* Spacing */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
    --space-section: 96px;

    /* Radius */
    --radius-xs: 6px;
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 24px;
    --radius-pill: 9999px;

    /* Transition */
    --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
    --transition: 0.15s var(--ease);
  }

  /* ========== BASE ========== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-text);
    background: var(--canvas);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-xl) var(--space-lg) 100px;
  }

  /* ========== HEADER ========== */
  .header {
    text-align: center;
    margin-bottom: var(--space-2xl);
    padding: var(--space-2xl) 0;
  }
  #clock {
    font-family: var(--font-display);
    font-size: 80px;
    font-weight: 600;
    letter-spacing: -3.0px;
    line-height: 1.05;
    color: var(--ink);
  }
  #date {
    font-family: var(--font-text);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-subtle);
    margin-top: var(--space-sm);
    letter-spacing: 0.4px;
    line-height: 1.3;
    text-transform: uppercase;
  }
  #greeting {
    font-family: var(--font-text);
    font-size: 18px;
    font-weight: 400;
    color: var(--ink-muted);
    margin-top: var(--space-sm);
    letter-spacing: -0.1px;
    line-height: 1.5;
  }

  /* ========== SEARCH ========== */
  .search-wrap {
    margin: 0 auto var(--space-2xl);
    max-width: 640px;
  }
  .search-engines {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .se-btn {
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--ink-tertiary);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--font-text);
    letter-spacing: 0;
  }
  .se-btn:hover {
    border-color: var(--hairline-strong);
    color: var(--ink-subtle);
  }
  .se-btn.active {
    background: var(--surface-2);
    border-color: var(--hairline-strong);
    color: var(--ink);
  }
  .search-box {
    position: relative;
    background: var(--surface-1);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    overflow: hidden;
    transition: all var(--transition);
  }
  .search-box:focus-within {
    border-color: var(--primary-focus);
    box-shadow: 0 0 0 2px rgba(94, 106, 210, 0.15);
  }
  .search-box input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 50px 14px 20px;
    color: var(--ink);
    font-size: 16px;
    font-family: var(--font-text);
    letter-spacing: -0.05px;
    line-height: 1.5;
  }
  .search-box input::placeholder { color: var(--ink-tertiary); }
  .search-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-tertiary);
    font-size: 16px;
    pointer-events: none;
  }
  .search-suggestions {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--surface-2);
    border: 1px solid var(--hairline);
    border-top: none;
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    display: none;
    z-index: 50;
  }
  .search-suggestions.show { display: block; }
  .suggestion-item {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    color: var(--ink-muted);
    letter-spacing: -0.05px;
    line-height: 1.5;
    transition: all 0.1s;
  }
  .suggestion-item:hover {
    background: var(--surface-3);
    color: var(--ink);
  }
  .suggestion-item .shortcut {
    float: right;
    color: var(--ink-tertiary);
    font-size: 11px;
    font-family: var(--font-mono);
  }

  /* ========== CARDS ========== */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: var(--space-2xl);
  }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    transition: all var(--transition);
  }
  .card:hover {
    border-color: var(--hairline-strong);
  }
  .card-label {
    font-family: var(--font-text);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    line-height: 1.3;
    color: var(--ink-subtle);
    margin-bottom: var(--space-md);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label .label-icon { font-size: 14px; }
  .card-span-2 { grid-column: span 2; }
  .card-span-3 { grid-column: span 3; }

  /* ========== WEATHER ========== */
  #weather-temp {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 600;
    letter-spacing: -1.0px;
    line-height: 1.15;
  }
  #weather-desc {
    color: var(--ink-tertiary);
    font-size: 13px;
    margin-top: 4px;
    letter-spacing: 0;
  }
  #weather-icon { font-size: 36px; margin-bottom: 8px; }
  .weather-forecast { display: flex; gap: 10px; margin-top: 14px; }
  .forecast-day {
    flex: 1;
    text-align: center;
    padding: 10px 6px;
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    border: 1px solid var(--hairline);

  .forecast-day .fd-label {
    font-size: 11px;
    color: var(--ink-tertiary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;

  .forecast-day .fd-icon { font-size: 18px; }
  .forecast-day .fd-temp {
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;

  /* ========== QUOTE ========== */
  .quote-wrap {

    flex-direction: column;
    justify-content: center;
    padding: 12px 0 8px;

  .quote-mark {
    font-family: Georgia, 'Times New Roman', serif;

    line-height: 0.6;
    color: var(--primary);

    position: absolute;

    pointer-events: none;

  #quote {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 400;

  #quote-author {

  .quote-refresh {

  /* ========== QUICK LINKS ========== */

  .links-edit-btn:hover {
    border-color: var(--hairline-strong);

  }
  .links-edit-btn.active {
    background: var(--surface-2);
    border-color: var(--hairline-strong);
    color: var(--ink);
  }
  .links {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .links a {
    color: var(--ink-muted);
    text-decoration: none;
    font-size: 13px;
    padding: 14px 12px;
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    transition: all var(--transition);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: var(--surface-1);

  }
  .links a .link-icon {
    width: 28px;
    height: 28px;
    object-fit: contain;
    border-radius: var(--radius-xs);
  }
  .mimo-link .mimo-icon {
    width: 44px;

  }
  .links a .link-label {
    font-size: 12px;

    letter-spacing: -0.12px;

  }
  .links a:hover {
    color: var(--ink);
    border-color: var(--hairline-strong);
    background: var(--surface-2);
  }
  .link-remove {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(229, 72, 77, 0.1);
    border: none;
    color: var(--danger);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .editing .link-remove { display: flex; }
  .editing a { border-style: dashed; }
  .link-add {
    color: var(--ink-tertiary);
    text-decoration: none;
    font-size: 13px;
    padding: 14px 12px;
    border: 1px dashed var(--hairline);
    border-radius: var(--radius-md);
    transition: all var(--transition);
    text-align: center;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;

  .link-add:hover {
    border-color: var(--hairline-strong);

  /* Link edit dialog */
  .link-dialog {
    position: fixed;

  .link-dialog-box {
    background: var(--surface-2);

  }
  .dialog-btn-save:hover {
    background: var(--primary-hover);
  }


  /* ========== TODO ========== */
  .todo-input-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: var(--space-md);
  }
  .todo-input {
    flex: 1;
    background: var(--surface-1);

    border-radius: var(--radius-md);

let todos=JSON.parse(localStorage.getItem('dashboard-todos')||'[]');
function saveTodos(){localStorage.setItem('dashboard-todos',JSON.stringify(todos))}
function renderTodos(){
  const el=document.getElementById('todoList');
  if(todos.length===0){el.innerHTML='<div style="color:var(--ink-tertiary);font-size:13px;padding:8px 0">暂无待办</div>';return}
  el.innerHTML=todos.map((t,i)=>
    '<div class="todo-item'+(t.done?' done':'')+'" data-idx="'+i+'">'+

function updateMediaSession(track){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({
    title:track.name,
    artist:track.artist||'未知',
    album:track.type==='stream'?'在线电台':'本地音乐',
  });
}

function playTrack(idx){
  if(idx<0||idx>=playlist.length)return;
  currentIndex=idx;
  const track=playlist[idx];
  isStream=track.type==='stream';
  audio.src=track.url;
  audio.play().then(()=>{isPlaying=true;playBtn.textContent='⏸';playerCover.classList.add('playing')}).catch(()=>{playerTitle.textContent='播放失败'});
  playerTitle.textContent=track.name;
  playerArtist.textContent=track.artist||'未知';
  updateMediaSession(track);
  renderPlaylist();
}

function getNextIndex(){
  if(playlist.length===0)return 0;
  if(playMode==='shuffle'){let n;do{n=Math.floor(Math.random()*playlist.length)}while(n===currentIndex&&playlist.length>1);return n}
  return(currentIndex+1)%playlist.length;
}
function getPrevIndex(){
  if(playlist.length===0)return 0;
  if(playMode==='shuffle'){let n;do{n=Math.floor(Math.random()*playlist.length)}while(n===currentIndex&&playlist.length>1);return n}
  return(currentIndex-1+playlist.length)%playlist.length;
}

playBtn.onclick=()=>{
  if(playlist.length===0)return;
  if(currentIndex<0){playTrack(0);return}
  if(isPlaying){audio.pause();isPlaying=false;playBtn.textContent='▶';playerCover.classList.remove('playing')}
  else{audio.play().catch(()=>{});isPlaying=true;playBtn.textContent='⏸';playerCover.classList.add('playing')}
};
prevBtn.onclick=()=>{
  if(playlist.length===0)return;
  if(playMode==='repeat'){audio.currentTime=0;audio.play()}
  else{playTrack(getPrevIndex())}
};
nextBtn.onclick=()=>{
  if(playlist.length===0)return;
  if(playMode==='repeat'){audio.currentTime=0;audio.play()}
  else{playTrack(getNextIndex())}
};

function setMode(m){
  if(playMode===m){playMode='sequential';shuffleBtn.classList.remove('active');repeatBtn.classList.remove('active')}
  else{playMode=m;shuffleBtn.classList.toggle('active',m==='shuffle');repeatBtn.classList.toggle('active',m==='repeat')}
}

function updateProgress(){
  if(isPlaying){
    if(isStream){progressFill.style.width='100%';timeNow.textContent=fmtTime(audio.currentTime);timeTotal.textContent='∞'}
    else if(audio.duration&&isFinite(audio.duration)){
      const pct=(audio.currentTime/audio.duration)*100;
      progressFill.style.width=pct+'%';timeNow.textContent=fmtTime(audio.currentTime);timeTotal.textContent=fmtTime(audio.duration);
    }
  }
  requestAnimationFrame(updateProgress);
}
updateProgress();

audio.addEventListener('ended',()=>{
  if(isStream)return;
  if(playMode==='repeat'){audio.currentTime=0;audio.play()}
  else{playTrack(getNextIndex())}
});
audio.addEventListener('pause',()=>{isPlaying=false;playBtn.textContent='▶';playerCover.classList.remove('playing');if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused'});
audio.addEventListener('play',()=>{isPlaying=true;playBtn.textContent='⏸';playerCover.classList.add('playing');if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing'});

progressBar.onclick=(e)=>{
  if(isStream||!audio.duration||!isFinite(audio.duration))return;
  const rect=progressBar.getBoundingClientRect();
  audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;
};
volumeBar.onclick=(e)=>{
  const rect=volumeBar.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  audio.volume=pct;volumeFill.style.width=(pct*100)+'%';
};

// ========== VISUALIZER ==========
const visCanvas=document.getElementById('visCanvas');
const visCtx=visCanvas.getContext('2d');
let audioCtx,analyser,dataArray,source;
function initVisualizer(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();analyser.fftSize=256;
  source=audioCtx.createMediaElementSource(audio);
  source.connect(analyser);analyser.connect(audioCtx.destination);
  dataArray=new Uint8Array(analyser.frequencyBinCount);
  drawVis();
}
function drawVis(){
  requestAnimationFrame(drawVis);
  analyser.getByteFrequencyData(dataArray);
  visCanvas.width=window.innerWidth;visCanvas.height=50;
  visCtx.clearRect(0,0,visCanvas.width,visCanvas.height);
  const bars=dataArray.length/2;const barW=visCanvas.width/bars;
  for(let i=0;i<bars;i++){
    const v=dataArray[i]/255;const h=v*40;
    const hue=235+v*30;
    visCtx.fillStyle='hsla('+hue+',60%,65%,'+v*0.5+')';
    visCtx.fillRect(i*barW,50-h,barW-1,h);
    // Mirror reflection
    visCtx.fillStyle='hsla('+hue+',60%,65%,'+v*0.15+')';
    visCtx.fillRect(i*barW,50,barW-1,h*0.4);
  }
}
document.addEventListener('click',()=>initVisualizer(),{once:true});

const DEFAULT_COUNTDOWNS=[
  {name:'2026 春节',date:'2026-02-17'},
  {name:'中秋',date:'2026-10-04'},
  {name:'元旦',date:'2027-01-01'},
];
let countdowns=JSON.parse(localStorage.getItem('dashboard-countdowns')||'null')||DEFAULT_COUNTDOWNS;

function renderCountdowns(){
  const el=document.getElementById('countdownList');
  const now=new Date();
  now.setHours(0,0,0,0);
  const sorted=[...countdowns].sort((a,b)=>new Date(a.date)-new Date(b.date));
  el.innerHTML=sorted.map(c=>{
    const target=new Date(c.date);
    target.setHours(0,0,0,0);
    const diff=Math.ceil((target-now)/(1000*60*60*24));
    let cls='';
    if(diff===0)cls=' today';
    else if(diff<=7)cls=' soon';
    const label=diff===0?'🎉 今天！':diff<0?Math.abs(diff)+' 天前':diff+' 天';
    return '<div class="countdown-item"><span class="cd-name">'+c.name+'</span><span class="cd-days'+cls+'">'+label+'</span></div>';
  }).join('')||'<div style="color:var(--ink-tertiary);font-size:12px;padding:8px 0">暂无倒计时</div>';
  localStorage.setItem('dashboard-countdowns',JSON.stringify(countdowns));
}
function addCountdown(){
  const name=document.getElementById('cdNameInput').value.trim();
  const date=document.getElementById('cdDateInput').value;
  if(!name||!date){showToast('请输入名称和日期');return}
  countdowns.push({name,date});
  renderCountdowns();
  document.getElementById('cdNameInput').value='';
  document.getElementById('cdDateInput').value='';
  showToast('已添加倒计时');
}
renderCountdowns();

// ========== REVEAL D4/D5 ==========
document.querySelectorAll('.reveal-d4').forEach(el=>el.style.animationDelay='0.32s');
document.querySelectorAll('.reveal-d5').forEach(el=>el.style.animationDelay='0.40s');

// ========== THEME SYSTEM ==========
// ========== LYRICS DISPLAY ==========
const lyricsText=document.getElementById('lyricsText');
const LYRICS_PLACEHOLDER=[
  '音乐是灵魂的语言...',
  '让旋律带你飞翔...',
  '每一个音符都有故事...',
  '沉浸在音乐的世界里...',
];
let lyricsIdx=0;
function updateLyrics(){
  if(isPlaying){
    lyricsText.textContent=LYRICS_PLACEHOLDER[lyricsIdx%LYRICS_PLACEHOLDER.length];
    lyricsText.classList.add('show');
    lyricsIdx++;
  } else {
    lyricsText.classList.remove('show');
  }
}
setInterval(updateLyrics,8000);
audio.addEventListener('play',()=>{lyricsIdx=0;updateLyrics()});
audio.addEventListener('pause',()=>lyricsText.classList.remove('show'));

const THEMES={
  linear:{
    name:'Linear',icon:'🌙',
    vars:{
      '--primary':'#5e6ad2','--primary-hover':'#828fff','--primary-focus':'#5e69d1',
      '--canvas':'#010102','--surface-1':'#0f1011','--surface-2':'#141516',
      '--surface-3':'#18191a','--surface-4':'#191a1b',
      '--hairline':'#23252a','--hairline-strong':'#34343a',
      '--ink':'#f7f8f8','--ink-muted':'#d0d6e0','--ink-subtle':'#8a8f98','--ink-tertiary':'#62666d',
    }
  },
  neon:{
    name:'Neon',icon:'💜',
    vars:{
      '--primary':'#00f0ff','--primary-hover':'#66f7ff','--primary-focus':'#00d4e0',
      '--canvas':'#0a0a0f','--surface-1':'#12121a','--surface-2':'#1a1a25',
      '--surface-3':'#222230','--surface-4':'#282838',
      '--hairline':'#2a2a3a','--hairline-strong':'#3a3a50',
      '--ink':'#e8e8ff','--ink-muted':'#b8b8d0','--ink-subtle':'#8888a8','--ink-tertiary':'#585878',
    }
  },
  pastel:{
    name:'Pastel',icon:'☀️',
    vars:{
      '--primary':'#6366f1','--primary-hover':'#818cf8','--primary-focus':'#4f46e5',
      '--canvas':'#faf9f7','--surface-1':'#ffffff','--surface-2':'#f5f3f0',
      '--surface-3':'#ebe9e5','--surface-4':'#e0ddd8',
      '--hairline':'#d8d5d0','--hairline-strong':'#c0bdb8',
      '--ink':'#1a1a1a','--ink-muted':'#4a4a4a','--ink-subtle':'#7a7a7a','--ink-tertiary':'#9a9a9a',
      '--on-primary':'#ffffff',
    }
  }
};
let currentTheme=localStorage.getItem('dashboard-theme')||'linear';
function applyTheme(name){
  const theme=THEMES[name];if(!theme)return;
  currentTheme=name;localStorage.setItem('dashboard-theme',name);
  const r=document.documentElement;
  Object.entries(theme.vars).forEach(([k,v])=>r.style.setProperty(k,v));
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===name));
}
applyTheme(currentTheme);

// ========== GSAP ANIMATIONS ==========
if(typeof gsap!=='undefined'){
  gsap.defaults({ duration: 0.7, ease: 'power3.out' });

  // Kill CSS animations — GSAP takes over from current visible state
  document.querySelectorAll('.reveal, .reveal-scale').forEach(el=>{
    el.style.animation='none';
    el.style.opacity='1';
    el.style.transform='none';
  });

  // Header timeline: clock → reflection → date → greeting → theme btns
  const headerTl=gsap.timeline({ delay: 0.2 });
  headerTl
    .from('#clock', { autoAlpha: 0, y: 40, scale: 0.95, duration: 0.9, ease: 'back.out(1.4)' })
    .from('#clock-reflection', { autoAlpha: 0, scaleY: 0, duration: 0.4 }, '-=0.3')
    .from('#date', { autoAlpha: 0, y: 15, duration: 0.5 }, '-=0.2')
    .from('#greeting', { autoAlpha: 0, y: 15, duration: 0.5 }, '-=0.3')
    .from('.header .theme-btn', { autoAlpha: 0, y: 10, stagger: 0.08, duration: 0.4 }, '-=0.2');

  // Search: scale-in with overshoot
  gsap.from('.search-wrap', { autoAlpha: 0, y: 20, scale: 0.97, duration: 0.7, delay: 0.5, ease: 'back.out(1.2)' });

  // Cards: staggered with slight random rotation
  gsap.from('.card', {
    autoAlpha: 0, y: 50, scale: 0.96,
    rotation: ()=>gsap.utils.random(-2, 2),
    stagger: { amount: 0.6, from: 'start' },
    duration: 0.8, delay: 0.7, ease: 'back.out(1.3)', clearProps: 'rotation'
  });

  // Links: stagger pop-in from edges
  gsap.from('.links a', { autoAlpha: 0, scale: 0.8, y: 15, stagger: { amount: 0.4, from: 'edges' }, duration: 0.5, delay: 1.0, ease: 'back.out(1.7)' });

  // Player bar: slide up
  gsap.from('.player-bar', { y: 80, autoAlpha: 0, duration: 0.6, delay: 1.2, ease: 'power3.out' });

  // Floating buttons: pop
  gsap.from('.playlist-toggle, .shortcut-help', { scale: 0, autoAlpha: 0, duration: 0.4, delay: 1.4, ease: 'back.out(2)', stagger: 0.1 });

  // Play button: breathing pulse
  gsap.to('.play-btn', { boxShadow: '0 0 20px rgba(94,106,210,0.4)', scale: 1.05, duration: 1.2, repeat: -1, yoyo: true, ease: 'sine.inOut' });

  // Search box: breathing glow
  gsap.to('.search-box', { boxShadow: '0 0 30px rgba(94,106,210,0.1)', duration: 2, repeat: -1, yoyo: true, ease: 'sine.inOut' });

  // Card hover: elastic scale
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('mouseenter',()=>gsap.to(card, { scale: 1.02, duration: 0.3, ease: 'power2.out' }));
    card.addEventListener('mouseleave',()=>gsap.to(card, { scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }));
  });

  // Link hover: elastic bounce
  document.querySelectorAll('.links a').forEach(link=>{
    link.addEventListener('mouseenter',()=>gsap.to(link, { scale: 1.08, duration: 0.25, ease: 'back.out(2)' }));
    link.addEventListener('mouseleave',()=>gsap.to(link, { scale: 1, duration: 0.3, ease: 'elastic.out(1, 0.4)' }));
  });

  // Greeting: subtle float
  gsap.to('#greeting', { y: -3, duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut' });

} // end GSAP

</script>
</body>
</html>
